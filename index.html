    <!-- ═══════════════════════════════════════════════

    ════════════════════════════════════════════════ -->

    <meta property="og:url" content="https://eastgold.co.in/" />

    ════════════════════════════════════════════════ -->
    <meta name="twitter:card" content="summary_large_image" />

      content="EastGold offers transparent gold valuation, instant cash for gold, certified purity testing, and trusted gold exchange services in Coimbatore."

    <!-- ═══════════════════════════════════════════════
         JSON-LD STRUCTURED DATA
    ════════════════════════════════════════════════ -->
    <script type="application/ld+json">

        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "EastGold",
        "url": "https://eastgold.co.in",
        "logo": "https://eastgold.co.in/logo.png",
        "description": "EastGold offers transparent gold valuation, instant cash for gold, certified purity testing, and trusted gold exchange services in Coimbatore.",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "F2, 1st Floor, Om Muruga Plaza, Ponniya Street, SBI Bank Near, Cross Cut Road",
          "addressLocality": "Coimbatore",
          "postalCode": "641008",
          "addressCountry": "IN"
        },
        "telephone": "+916374770359",
        "email": "eastgoldbusiness@gmail.com",
        "openingHoursSpecification": [
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"],
            "opens": "09:00",
            "closes": "19:00"
          },
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": "Sunday",
            "opens": "09:00",
            "closes": "17:00"
          }
        ],
        "sameAs": [
          "https://eastgold.co.in"
        ]
      }
    </script>

    <!-- ═══════════════════════════════════════════════
         FONTS
    ════════════════════════════════════════════════ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      rel="stylesheet"
    />

    <!-- ═══════════════════════════════════════════════
         PERFORMANCE — HERO IMAGE PRELOAD
    ════════════════════════════════════════════════ -->
    <link
      rel="preload"
      as="image"
      href="/images/hero-bg-md.webp"
      imagesrcset="/images/hero-bg-sm.webp 480w, /images/hero-bg-md.webp 800w, /images/hero-bg-lg.webp 1200w, /images/hero-bg.webp 1600w"
      imagesizes="(max-width: 1024px) 100vw, 50vw"
    />

    <!-- ═══════════════════════════════════════════════
         LANGUAGE PERSISTENCE (before first paint)
    ════════════════════════════════════════════════ -->
    <script>
      try {
        var l = localStorage.getItem('eastgold-lang')
        if (l === 'ta') {
          document.documentElement.lang = 'ta'
          document.documentElement.classList.add('lang-ta')
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
